services:
  booking-db:
    image: mongo:8
    container_name: booking-mongodb-core
    restart: unless-stopped
    ports:
      - 27017:27017
    volumes:
      - ./init-scripts/:/docker-entrypoint-initdb.d/:ro
      - mongo_data:/data/db

  booking-backend:
    build:
      context: ./event-booking-service
      dockerfile: Dockerfile
    container_name: booking-backend-service
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      MONGO_USERNAME: user
      MONGO_PASSWORD: password
      MONGO_HOST: booking-db
      MONGO_PORT: 27017
      MONGO_DATABASE: trainingdb
      MONGO_AUTH_DATABASE: admin
      JWT_SECRET: XhXH96vnxEAD1i53Jk+1w9/5RwMqjYXEZlGJUmj7udU=
    depends_on:
      - booking-db
    volumes:
      - ./uploads:/app/uploads

  booking-frontend:
    build:
      context: ./event-booking-app
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: http://localhost:8080
    container_name: booking-frontend-app
    restart: unless-stopped
    ports:
      - "5173:80"
    depends_on:
      - booking-backend

volumes:
  mongo_data:

